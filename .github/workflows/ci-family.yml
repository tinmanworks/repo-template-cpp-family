name: CI (C/C++ Family)

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Scaffold all models (cpp) + doctor
        run: |
          set -euo pipefail
          models=(lib exe engine-app workspace plugin-shared plugin-addon)
          for model in "${models[@]}"; do
            out="$(mktemp -d)/${model}-cpp"
            python3 tools/scaffold.py --model "$model" --lang cpp --project-name "smoke_${model}" --output-dir "$out" --setup
            (
              cd "$out"
              cmake --preset native-debug
              cmake --build --preset native-debug
              ctest --test-dir build/native-debug --output-on-failure
            )
          done

  nightly-matrix:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
            cc: gcc
            cxx: g++
          - os: ubuntu-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: macos-latest
            compiler: clang
            cc: clang
            cxx: clang++
          - os: windows-latest
            compiler: msvc
            cc: cl
            cxx: cl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja -y
        shell: powershell

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
        shell: powershell

      - name: Matrix scaffold/build/test
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          set -euo pipefail
          models=(lib exe engine-app workspace plugin-shared plugin-addon)
          for model in "${models[@]}"; do
            for preset in native-debug ninja-debug; do
              out="$(mktemp -d)/${model}-${preset}"
              python3 tools/scaffold.py --model "$model" --lang cpp --project-name "nightly_${model}_${preset}" --output-dir "$out" --setup
              (
                cd "$out"
                cmake --preset "$preset"
                cmake --build --preset "$preset"
                ctest --test-dir "build/${preset}" --output-on-failure
              )
            done
          done
        shell: bash
